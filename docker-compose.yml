services:
  minecraft-crossplay:
    image: itzg/minecraft-server:latest
    container_name: minecraft-crossplay
    restart: unless-stopped
    stdin_open: true
    tty: true

    ports:
      # Minecraft Java
      - "25565:25565/tcp"

      # Minecraft Bedrock mediante Geyser
      - "19132:19132/udp"

    environment:
      EULA: "TRUE"
      TZ: "America/Lima"

      # Servidor Java optimizado y compatible con plugins
      TYPE: "PAPER"
      VERSION: "LATEST"

      SERVER_NAME: "Servidor de Beni"
      MOTD: "Servidor Java y Bedrock de Beni"

      MODE: "survival"
      DIFFICULTY: "normal"
      MAX_PLAYERS: "10"

      ONLINE_MODE: "true"
      ENABLE_WHITELIST: "false"

      VIEW_DISTANCE: "12"
      SIMULATION_DISTANCE: "8"

      MEMORY: "4G"

      # Descarga automática de plugins
      PLUGINS: |
        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
        https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot

    volumes:
      - minecraft-crossplay-data:/data

volumes:
  minecraft-crossplay-data: