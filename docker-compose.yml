version: "3.8"

services:
  minecraft-bedrock:
    image: itzg/minecraft-bedrock-server:latest

    container_name: minecraft-bedrock

    restart: unless-stopped

    ports:
      - "19132:19132/udp"

    environment:

      EULA: "TRUE"

      SERVER_NAME: "Servidor de Beni"

      GAMEMODE: "survival"

      DIFFICULTY: "normal"

      LEVEL_NAME: "Mi Mundo"

      MAX_PLAYERS: 10

      ONLINE_MODE: "true"

      ALLOW_CHEATS: "false"

      VIEW_DISTANCE: 24

      TICK_DISTANCE: 8

    volumes:
      - ./minecraft-data:/data