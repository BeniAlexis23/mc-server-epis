services:
  minecraft-crossplay:
    image: itzg/minecraft-server:latest
    container_name: minecraft-crossplay
    restart: unless-stopped
    stdin_open: true
    tty: true

    ports:
      # Minecraft Java
      - "25565:25565/tcp"

      # Minecraft Bedrock mediante Geyser
      - "19132:19132/udp"

    environment:
      # Obligatorio
      EULA: "TRUE"

      # Zona horaria
      TZ: "America/Lima"

      # Servidor Java optimizado
      TYPE: "PAPER"

      # Última versión estable disponible
      VERSION: "LATEST"

      # Configuración general
      MOTD: "Servidor EPIS | Java + Bedrock"
      SERVER_NAME: "Servidor EPIS"

      MODE: "survival"
      DIFFICULTY: "normal"
      MAX_PLAYERS: "20"

      MEMORY: "4G"

      ONLINE_MODE: "TRUE"
      ENABLE_WHITELIST: "FALSE"

      ALLOW_FLIGHT: "TRUE"
      PVP: "TRUE"
      SPAWN_PROTECTION: "0"

      VIEW_DISTANCE: "12"
      SIMULATION_DISTANCE: "8"

      # Administración remota
      ENABLE_RCON: "TRUE"
      RCON_PASSWORD: "CambiaEstaClavePorUnaSegura"

      # Aplicar las variables al server.properties
      OVERRIDE_SERVER_PROPERTIES: "TRUE"

      # Plugins esenciales para Crossplay
      PLUGINS: |
        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
        https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot

    volumes:
      - minecraft-crossplay-data:/data

volumes:
  minecraft-crossplay-data: